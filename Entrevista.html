<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>EntrevistaAI</title>
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="Entrevista.css" />
</head>
<body>

<div id="tela-inicio">
  <div class="titulo">EntrevistaAI</div>
  <p class="subtitulo">Treine entrevistas com um recrutador virtual</p>
  <div class="card-form">
    <h2>Preencha seus dados</h2>
    <div class="campo">
      <label>Seu nome</label>
      <input type="text" id="nome" placeholder="Ex: João Silva" />
    </div>
    <div class="campo">
      <label>Vaga pretendida</label>
      <input type="text" id="vaga" placeholder="Ex: Desenvolvedor Front-end Júnior" />
    </div>
    <div class="campo">
      <label>Nível</label>
      <select id="nivel">
        <option value="estágio">Estágio</option>
        <option value="júnior" selected>Júnior</option>
        <option value="pleno">Pleno</option>
        <option value="sênior">Sênior</option>
      </select>
    </div>
    <div class="campo">
      <label>Habilidades (opcional)</label>
      <textarea id="habilidades" placeholder="Ex: JavaScript, React, Git..."></textarea>
    </div>
    <div class="campo">
      <label>Tom da entrevista</label>
      <select id="tom">
        <option value="formal">Formal / Corporativa</option>
        <option value="tecnica">Técnica / Aprofundada</option>
        <option value="startup">Descontraída / Startup</option>
      </select>
    </div>
    <div class="erro" id="msg-erro">Preencha o nome e a vaga antes de continuar.</div>
    <button class="btn-iniciar" onclick="iniciarEntrevista()">Iniciar entrevista →</button>
  </div>
</div>

<div id="tela-entrevista">
  <div class="header">
    <div class="header-esq">
      <div class="avatar-ia">🤖</div>
      <div>
        <div class="header-nome">Ana — Recrutadora</div>
        <div class="header-status">
          <span class="dot-verde"></span> Entrevista em andamento
        </div>
      </div>
    </div>
    <button class="btn-encerrar" onclick="encerrarEntrevista()">Encerrar e ver feedback</button>
  </div>
  <div id="area-chat"></div>
  <div class="barra-input">
    <div class="barra-inner">
      <textarea id="campo-resposta" placeholder="Digite sua resposta..." rows="1"
        onkeydown="teclaEnter(event)" oninput="ajustarAltura(this)"></textarea>
      <button class="btn-enviar" onclick="enviarMensagem()">
        <svg viewBox="0 0 24 24"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
      </button>
    </div>
    <p class="dica-teclado">Enter para enviar · Shift+Enter para nova linha</p>
  </div>
</div>

<div id="tela-feedback">
  <div class="card-feedback">
    <h2>📋 Feedback da entrevista</h2>
    <div id="conteudo-feedback">Analisando sua entrevista...</div>
    <button class="btn-novo" onclick="reiniciar()">Fazer nova entrevista</button>
  </div>
</div>

<script src="Entrevista.js"></script>
</body>
</html>
